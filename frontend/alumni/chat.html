<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Alumni Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
    <link rel="icon" href="../../images/favicon.png" type="image/png">
    <style>
        .chat-container {
            height: calc(100vh - 120px);
            display: flex;
            flex-direction: column;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
        }
        .message.sent {
            justify-content: flex-end;
        }
        .message.received {
            justify-content: flex-start;
        }
        .message-bubble {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 15px;
            position: relative;
        }
        .message.sent .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .message.received .message-bubble {
            background: white;
            border: 1px solid #dee2e6;
            color: #2c3e50;
        }
        .message-time {
            font-size: 11px;
            margin-top: 5px;
            opacity: 0.7;
        }
        .chat-sidebar {
            border-right: 1px solid #dee2e6;
            height: 100%;
            overflow-y: auto;
        }
        .chat-user-item {
            padding: 15px;
            cursor: pointer;
            transition: background 0.3s ease;
            border-bottom: 1px solid #dee2e6;
        }
        .chat-user-item:hover, .chat-user-item.active {
            background: #f8f9fa;
        }
        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }
        .unread-indicator {
            background: #dc3545;
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 11px;
            margin-left: 8px;
        }
        .message-input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #dee2e6;
        }
        .typing-indicator {
            font-size: 12px;
            color: #6c757d;
            padding: 5px 15px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse">
                <div class="position-sticky pt-3">
                    <div class="text-center mb-4">
                        <i class="fas fa-graduation-cap fa-2x text-white mb-2"></i>
                        <h5 class="text-white">EduHelp</h5>
                    </div>
                    
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" href="dashboard.html">
                                <i class="fas fa-tachometer-alt me-2"></i>
                                Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="chat.html">
                                <i class="fas fa-comments me-2"></i>
                                Messages
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="profile.html">
                                <i class="fas fa-user me-2"></i>
                                Profile
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="../index.html" id="logoutBtn">
                                <i class="fas fa-sign-out-alt me-2"></i>
                                Logout
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Messages</h1>
                </div>

                <div class="chat-container">
                    <div class="row h-100">
                        <!-- Chat sidebar - users list -->
                        <div class="col-md-4 chat-sidebar">
                            <div class="p-3 border-bottom">
                                <div class="btn-group w-100" role="group">
                                    <button type="button" class="btn btn-outline-primary" id="tabStudents">Students</button>
                                    <button type="button" class="btn btn-outline-primary" id="tabTeachers">Teachers</button>
                                </div>
                            </div>
                            <div id="usersList">
                                <div class="text-center py-4">
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="visually-hidden">Loading...</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Chat area -->
                        <div class="col-md-8 d-flex flex-column">
                            <div id="chatHeader" class="p-3 border-bottom bg-white">
                                <div class="d-flex align-items-center">
                                    <div class="user-avatar me-3" id="chatAvatar">JD</div>
                                    <div>
                                        <h5 class="mb-0" id="chatUserName">Select a user to start chatting</h5>
                                        <small class="text-muted" id="chatUserRole"></small>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="messages-container" id="messagesContainer">
                                <div class="text-center text-muted py-5">
                                    <i class="fas fa-comments fa-3x mb-3 d-block"></i>
                                    <p>Select a user from the left to start chatting</p>
                                </div>
                            </div>
                            
                            <div class="message-input-area">
                                <div class="typing-indicator" id="typingIndicator" style="display: none;">
                                    <i class="fas fa-ellipsis-h me-1"></i>Someone is typing...
                                </div>
                                <div class="input-group">
                                    <input type="text" class="form-control" id="messageInput" placeholder="Type your message..." disabled>
                                    <button class="btn btn-primary" id="sendBtn" disabled>
                                        <i class="fas fa-paper-plane"></i> Send
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="js/alumni.js"></script>
</body>
</html>
