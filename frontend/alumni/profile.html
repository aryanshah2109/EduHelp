<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni Profile - EduHelp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
    <link rel="icon" href="../../images/favicon.png" type="image/png">
    <style>
        .profile-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 48px;
            font-weight: bold;
        }
        .profile-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .edit-mode {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse">
                <div class="position-sticky pt-3">
                    <div class="text-center mb-4">
                        <i class="fas fa-graduation-cap fa-2x text-white mb-2"></i>
                        <h5 class="text-white">EduHelp</h5>
                    </div>
                    
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" href="dashboard.html">
                                <i class="fas fa-tachometer-alt me-2"></i>
                                Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="chat.html">
                                <i class="fas fa-comments me-2"></i>
                                Messages
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="profile.html">
                                <i class="fas fa-user me-2"></i>
                                Profile
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="../index.html" id="logoutBtn">
                                <i class="fas fa-sign-out-alt me-2"></i>
                                Logout
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Alumni Profile</h1>
                    <div>
                        <button class="btn btn-outline-primary me-2" id="editBtn" onclick="toggleEditMode()">
                            <i class="fas fa-edit me-1"></i>Edit Profile
                        </button>
                        <button class="btn btn-primary" id="saveBtn" onclick="saveProfile()" style="display: none;">
                            <i class="fas fa-save me-1"></i>Save Changes
                        </button>
                        <button class="btn btn-secondary" id="cancelBtn" onclick="cancelEdit()" style="display: none;">
                            <i class="fas fa-times me-1"></i>Cancel
                        </button>
                    </div>
                </div>

                <div class="row">
                    <div class="col-lg-4 mb-4">
                        <div class="dashboard-card text-center">
                            <div class="card-body">
                                <div class="profile-avatar" id="profileAvatar">
                                    <i class="fas fa-user-circle fa-5x"></i>
                                </div>
                                <h4 id="profileName">Loading...</h4>
                                <p class="text-muted" id="profileRole">Alumni</p>
                                <p class="text-muted" id="profileEmail">Loading...</p>
                                <div id="linkedinSection" style="display: none;">
                                    <a href="#" id="linkedinLink" target="_blank" class="btn btn-outline-info btn-sm mt-2">
                                        <i class="fab fa-linkedin me-1"></i>LinkedIn Profile
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-8">
                        <div class="dashboard-card">
                            <div class="card-header">
                                <h6 class="m-0 font-weight-bold">Professional Information</h6>
                            </div>
                            <div class="card-body">
                                <div id="profileInfo">
                                    <div class="text-center">
                                        <div class="spinner-border text-primary" role="status">
                                            <span class="visually-hidden">Loading...</span>
                                        </div>
                                        <p class="mt-2">Loading profile information...</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="dashboard-card mt-4">
                            <div class="card-header">
                                <h6 class="m-0 font-weight-bold">Bio & About</h6>
                            </div>
                            <div class="card-body">
                                <div id="bioSection">
                                    <div class="text-center text-muted">
                                        <i class="fas fa-spinner fa-spin me-2"></i>Loading...
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="js/alumni.js"></script>
</body>
</html>
