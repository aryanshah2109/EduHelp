<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EduHelp</title>
    <link rel="icon" href="../images/favicon.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <style>
        .password-input-group {
            position: relative;
        }
        .password-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #6c757d;
            cursor: pointer;
            padding: 0;
            z-index: 10;
        }
        .password-toggle:hover {
            color: #495057;
        }
        .role-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-4">
                    <div class="login-card p-4">
                        <div class="text-center mb-4">
                            <i class="fas fa-graduation-cap fa-3x text-primary mb-3"></i>
                            <h2>Welcome Back</h2>
                            <p class="text-muted">Sign in to your account</p>
                        </div>
                        
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="username" name="username" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <div class="password-input-group">
                                    <input type="password" class="form-control" id="password" name="password" required>
                                    <button type="button" class="password-toggle" id="togglePassword">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100 mb-3">Sign In</button>
                            
                            <div class="text-center">
                                <p class="mb-0">Don't have an account? <a href="signup.html">Sign up</a></p>
                            </div>
                        </form>
                        
                        <div class="mt-4 p-3 bg-light rounded">
                            <small class="text-muted">
                                <strong>Demo Accounts:</strong><br>
                                Student: student1 / password<br>
                                Teacher: teacher1 / password<br>
                                Alumni: alumni1 / password
                            </small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="role-badge">
        <i class="fas fa-graduation-cap me-1"></i> EduHelp v2.0
    </div>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Update the login redirection to handle alumni role
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                // Override the existing submit handler to add alumni support
                const originalSubmit = loginForm.onsubmit;
                loginForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    
                    const formData = new FormData(this);
                    const username = formData.get('username');
                    const password = formData.get('password');
                    
                    try {
                        const params = new URLSearchParams();
                        params.append('username', username);
                        params.append('password', password);
                        params.append('grant_type', 'password');
                        
                        console.log('🔐 Attempting login for user:', username);
                        
                        const response = await fetch('http://127.0.0.1:8000/auth/token', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/x-www-form-urlencoded',
                            },
                            body: params
                        });
                        
                        if (!response.ok) {
                            const errorData = await response.json();
                            throw new Error(errorData.detail || `Login failed with status ${response.status}`);
                        }
                        
                        const data = await response.json();
                        console.log('✅ Login successful, token received');
                        
                        Auth.setToken(data.access_token);
                        console.log('📍 Token stored');
                        
                        // Get user info to determine role
                        try {
                            const userInfo = await API.get('/auth/me');
                            Auth.setUserRole(userInfo.role);
                            console.log('✅ User role determined:', userInfo.role);
                            
                            showNotification('Login successful! Redirecting...', 'success');
                            
                            setTimeout(() => {
                                if (userInfo.role === 'teacher') {
                                    window.location.href = 'teacher/dashboard.html';
                                } else if (userInfo.role === 'alumni') {
                                    window.location.href = 'alumni/dashboard.html';
                                } else {
                                    window.location.href = 'student/dashboard.html';
                                }
                            }, 1000);
                            
                        } catch (error) {
                            console.warn('Could not get user info, using default role');
                            const role = username.includes('teacher') ? 'teacher' : 
                                       username.includes('alumni') ? 'alumni' : 'student';
                            Auth.setUserRole(role);
                            
                            showNotification('Login successful! Redirecting...', 'success');
                            setTimeout(() => {
                                if (role === 'teacher') {
                                    window.location.href = 'teacher/dashboard.html';
                                } else if (role === 'alumni') {
                                    window.location.href = 'alumni/dashboard.html';
                                } else {
                                    window.location.href = 'student/dashboard.html';
                                }
                            }, 1000);
                        }
                        
                    } catch (error) {
                        console.error('❌ Login error:', error);
                        showNotification(`Login failed: ${error.message}`, 'danger');
                    }
                });
            }
        });
    </script>
</body>
</html>
